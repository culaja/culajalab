name: Docker Build and Push

on:
  push:

env:
  REGISTRY: ghcr.io
  OWNER: culaja

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image: bt-meter-collector
            context: ./bt-meter-collector
          - image: ha-device-registrar
            context: ./ha-device-registrar
          - image: hitachi-yutaki-2016-mqtt-gateway
            context: ./hitachi-yutaki-2016-mqtt-gateway
          - image: mqtt-timescale-consumer
            context: ./mqtt-timescale-consumer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:${{ env.SHORT_SHA }}
